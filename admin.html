<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin • Smart Vote 2025</title>

  <meta name="theme-color" content="#0f172a" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --accent: #3b82f6;
      --success: #10b981;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #1e3c72, #1e40af);
      padding: 35px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      position: relative;
    }
    h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: 1px; }
    .status { font-size: 1.4rem; margin-top: 10px; font-weight: 600; }

    /* Bouton mode */
    .mode-btn {
      position: absolute;
      top: 25px;
      right: 25px;
      padding: 12px 22px;
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(59,130,246,0.5);
      transition: 0.3s;
    }
    .mode-btn:hover { transform: scale(1.05); }

    .container { padding: 30px 20px; max-width: 1400px; margin: 0 auto; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card);
      padding: 28px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-8px); }
    .stat-card h2 { font-size: 3.2rem; font-weight: 900; margin: 10px 0; }
    .stat-card p { font-size: 1.1rem; opacity: 0.9; }

        /* Graphique centré et responsive */
    .chart-wrapper {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin: 40px 0;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
    }
    .chart-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 400px;
    }

    .results-list { display: grid; gap: 16px; margin-top: 20px; }
    .result-item {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: all 0.3s;
    }
    .result-item:hover { transform: translateX(8px); }
    .candidate-info { display: flex; align-items: center; gap: 18px; }
    .candidate-logo {
      width: 78px; height: 78px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.2);
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    }
    .candidate-name { font-size: 1.35rem; font-weight: 700; }
    .votes { font-size: 1.7rem; font-weight: 900; }
    .percent { font-size: 1.25rem; opacity: 0.9; }

    .progress-bar {
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 8px;
      width: 150px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 6px;
      transition: width 1.5s ease;
      width: 0%;
    }

    .export-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: var(--success);
      color: white;
      border: none;
      padding: 16px 28px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(16,185,129,0.5);
      z-index: 1000;
      transition: all 0.3s;
    }
    .export-btn:hover { transform: scale(1.08); }

    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .status { font-size: 1.2rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
      .stat-card h2 { font-size: 2.6rem; }
      .result-item { flex-direction: column; text-align: center; gap: 14px; }
      .candidate-info { flex-direction: column; text-align: center; }
      .progress-bar { width: 100%; margin: 10px auto 0; }
      .chart-container { height: 350px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .chart-container { height: 300px; }
    }

    /* Illustration mode notification */
    .illustration {
      text-align: center;
      margin-top: 80px;
      display: none;
    }
    .illustration img {
      width: 220px;
      opacity: 0.85;
      animation: pulse 2s infinite;
    }
    .illustration h2 {
      margin-top: 25px;
      font-size: 1.8rem;
      font-weight: 700;
      opacity: 0.9;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* Tooltip vote */
    .vote-tooltip {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: var(--card);
      padding: 15px 20px;
      border-radius: 12px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      color: var(--success);
      border-left: 5px solid var(--success);
    }
  </style>
</head>

<body>

<header>
  <h1 id="election-title">Smart Vote 2025</h1>
  <div class="status" id="election-status">Élection en cours</div>
</header>

<!-- BOUTON MODE -->
<button id="modeBtn" class="mode-btn">Décompte</button>

<!-- TOOLTIP -->
<div id="voteTooltip" class="vote-tooltip">Un vote a été effectué ✔</div>

<!-- Illustration Mode Notification -->
<div id="illustration" class="illustration">
  <img src="https://imgur.com/ESIDQFC.png">
  <h2>Mode Notification activé</h2>
  <p style="opacity:0.8; margin-top:8px;">Les résultats sont temporairement masqués</p>
</div>

<div class="container" id="content">
  <div class="stats-grid" id="stats"></div>

  <div class="chart-wrapper">
    <div class="chart-container">
      <canvas id="voteChart"></canvas>
    </div>
  </div>

  <div class="results-list" id="results-list"></div>
</div>

<button class="export-btn" id="exportBtn">Exporter CSV</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAGvGH0_EdWKkg1IpA0F0LDhDfvN69_0Ok",
    authDomain: "smart-vote-edeee.firebaseapp.com",
    databaseURL: "https://smart-vote-edeee-default-rtdb.firebaseio.com",
    projectId: "smart-vote-edeee",
    storageBucket: "smart-vote-edeee.firebasestorage.app",
    messagingSenderId: "826001279152",
    appId: "1:826001279152:web:e230015e902d8147a6d375"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let chart = null;
  let currentTotalVotes = 0;
  let lastVoteCount = 0;

  let modeDecompte = false;

  const content = document.getElementById("content");
  const exportBtn = document.getElementById("exportBtn");
  const illustration = document.getElementById("illustration");

  content.style.display = "none"; // MASQUÉ PAR DÉFAUT (mode notif)
  illustration.style.display = "block";

  document.getElementById("modeBtn").addEventListener("click", () => {
    modeDecompte = !modeDecompte;

    if (modeDecompte) {
      document.getElementById("modeBtn").textContent = "Mode Notification";
      content.style.display = "block";
      exportBtn.style.display = "block";
      illustration.style.display = "none";

    } else {
      document.getElementById("modeBtn").textContent = "Décompte";
      content.style.display = "none";
      exportBtn.style.display = "none";
      illustration.style.display = "block";
    }
  });

  const tooltip = document.getElementById("voteTooltip");

  function showTooltip() {
    tooltip.style.opacity = 1;
    setTimeout(() => { tooltip.style.opacity = 0; }, 6000);
  }

  db.ref('election').on('value', snap => {
    const e = snap.val() || {};
    document.getElementById('election-title').textContent = e.title || "Smart Vote 2025";

    const statusEl = document.getElementById('election-status');
    statusEl.textContent = e.status === "terminee" ? "Élection terminée" : "Élection en cours";
    statusEl.style.color = e.status === "terminee" ? "#ef4444" : "#10b981";
  });

  db.ref().on('value', snap => {
    const data = snap.val() || {};
    const votes = data.votes || {};
    const candidates = data.candidates || {};
    const election = data.election || {};

    const newTotal = Object.values(votes).reduce((a, b) => a + b, 0);

    if (!modeDecompte && newTotal > lastVoteCount) {
      showTooltip();
    }
    lastVoteCount = newTotal;

    currentTotalVotes = newTotal;
    const totalElecteurs = election.total_votants || 1;
    const participation = ((currentTotalVotes / totalElecteurs) * 100).toFixed(2);

    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><h2>${currentTotalVotes}</h2><p>Votes exprimés</p></div>
      <div class="stat-card"><h2>${Object.keys(candidates).length}</h2><p>Duos en liste</p></div>
      <div class="stat-card"><h2>${totalElecteurs}</h2><p>Électeurs inscrits</p></div>
      <div class="stat-card"><h2>${participation}%</h2><p>Participation</p></div>
    `;

    const ordered = Object.keys(candidates).sort((a,b) =>
      (candidates[a].order || 99) - (candidates[b].order || 99)
    );

    const labels = ordered.map(k => candidates[k].name);
    const values = ordered.map(k => votes[k] || 0);
    const colors = ordered.map(k => candidates[k].color || '#64748b');

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('voteChart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 4, borderColor: '#0f172a', hoverOffset: 20 }] },
      options: {
        plugins: {
          legend: { position: 'bottom', labels: { color: '#e2e8f0' }},
          datalabels: {
            color: 'white',
            font: { weight: 'bold', size: 15 },
            formatter: val => val > 0 ? `${val}\n${((val/currentTotalVotes)*100).toFixed(1)}%` : ''
          }
        }
      },
      plugins: [ChartDataLabels]
    });

    const list = document.getElementById('results-list');
    list.innerHTML = "";

    ordered.forEach(key => {
      const c = candidates[key];
      const v = votes[key] || 0;
      const p = currentTotalVotes > 0 ? (v / currentTotalVotes * 100).toFixed(2) : 0;

      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <div class="candidate-info">
          <img src="${c.logo}" class="candidate-logo" onerror="this.src='https://via.placeholder.com/80'">
          <div>
            <div class="candidate-name">${c.name}</div>
            <div class="percent">${p}% des voix</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="votes">${v}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
        </div>
      `;
      list.appendChild(item);
    });
  });

  exportBtn.addEventListener('click', () => {
    db.ref().once('value').then(snap => {
      const data = snap.val() || {};
      const votes = data.votes || {};
      const candidates = data.candidates || {};
      const total = currentTotalVotes;

      let csv = "Duo,Nom,Votes,Pourcentage\n";

      Object.keys(candidates).forEach(key => {
        const v = votes[key] || 0;
        const p = total > 0 ? (v / total * 100).toFixed(2) : 0;
        csv += `${key},"${candidates[key].name}",${v},${p}%\n`;
      });

      const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `resultats_smartvote.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });
  });
</script>
</body>
</html>
